name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: unit + lint (hosted, no KVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (echo "needs gofmt:"; gofmt -l .; exit 1)
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          find scripts test -name '*.sh' -print0 | xargs -0 -r shellcheck
      - name: yamllint
        run: |
          sudo apt-get install -y yamllint
          yamllint examples scripts/lima

  integration:
    name: live boot/KVM (self-hosted M3)
    # KVM/boot tests need nested virtualization, which hosted runners lack.
    # Enable by registering a self-hosted Apple-silicon runner with these labels
    # and flipping this guard. Until then, live tests run on the maintainer's Mac
    # via `make test-live`.
    if: ${{ false }}
    runs-on: [self-hosted, macos, klab-m3]
    steps:
      - uses: actions/checkout@v4
      - run: make build
      - run: ./test/integration/run.sh
